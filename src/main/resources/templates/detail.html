<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${item.name} + ' - RogerMart'">Item Detail</title>
    <link rel="stylesheet" th:href="@{/css/home.style.css}">
    <link rel="stylesheet" th:href="@{/css/detail.style.css}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand"><a th:href="@{/home}" style="color: inherit; text-decoration: none;">RogerMart.</a></div>
        <form class="nav-search" th:action="@{/search}" method="get">
            <input type="text" name="q" placeholder="What are you looking for?" th:value="${searchQuery}">
            <button type="submit">Search</button>
        </form>
        <div class="nav-links">
            <span class="user-greeting" th:if="${session.user != null}">
                <a th:href="@{/profile}" style="text-decoration: none; color: inherit;">Welcome Back, <span
                        th:text="${session.user.name}"></span>!</a>
            </span>
            <span class="user-greeting" th:unless="${session.user != null}">
                Welcome, Guest! <a th:href="@{/login}" class="btn-nav-login">Login</a>
            </span>
            <a th:href="@{/wishlist}">Wishlist</a>
            <a th:href="@{/cart}" class="cart-link">Cart <span class="cart-badge"
                    th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}"></span></a>
        </div>
    </nav>

    <main class="main-content">
        <div class="product-container">
            <div class="product-image-box">
                <img th:src="${item.imageUrl}" class="product-image">
            </div>

            <div class="product-info-box">
                <h2 class="product-title" th:text="${item.name}"></h2>
                <p class="product-price" th:text="'¥' + ${item.price}"></p>
                <p class="product-description" th:text="${item.description}"></p>

                <div class="product-actions">
                    <div class="action-row-1">
                        <form th:action="@{/cart/add}" method="post" class="form-add-cart">
                            <input type="hidden" name="itemId" th:value="${item.id}">
                            <button type="submit" class="btn-add-cart">Add to Cart</button>
                        </form>

                        <form th:action="@{/wishlist/add}" method="post" class="form-wishlist">
                            <input type="hidden" name="itemId" th:value="${item.id}">
                            <button type="submit" class="btn-wishlist"
                                th:classappend="${isWishlisted != null and isWishlisted} ? 'btn-wishlisted' : ''"
                                title="Toggle Wishlist">♥</button>
                        </form>
                    </div>

                    <div class="action-row-2">
                        <form th:action="@{/cart/buyNow}" method="post" style="width: 100%;">
                            <input type="hidden" name="itemId" th:value="${item.id}">
                            <button type="submit" class="btn-buy-now">Buy Now</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div class="review-section">
        <h3>Customer Reviews</h3>

        <div class="rating-overview" th:if="${item.reviewCount != null and item.reviewCount > 0}">
            <h1 th:text="${#numbers.formatDecimal(item.averageRating, 1, 1)}"></h1>
            <p>Based on <span th:text="${item.reviewCount}"></span> reviews</p>
        </div>

        <div class="add-review-box" th:if="${canReview}">
            <h4>Write a Review</h4>
            <form th:action="@{/review/add}" method="post">
                <input type="hidden" name="itemId" th:value="${item.id}">
                <select name="rating" required class="rating-select">
                    <option value="" disabled selected>Select Rating</option>
                    <option value="5">★★★★★ - Excellent</option>
                    <option value="4">★★★★☆ - Good</option>
                    <option value="3">★★★☆☆ - Average</option>
                    <option value="2">★★☆☆☆ - Poor</option>
                    <option value="1">★☆☆☆☆ - Terrible</option>
                </select>
                <textarea name="comment" placeholder="Tell us what you thought..." required rows="3"
                    class="review-textarea"></textarea>
                <button type="submit" class="btn-submit">Submit Review</button>
            </form>
        </div>

        <div class="review-list">
            <p th:if="${#lists.isEmpty(reviews)}">No reviews yet. Be the first!</p>

            <div class="review-card" th:each="r : ${reviews}">
                <div class="review-header">
                    <strong th:text="${r.userName}"></strong>
                    <span class="stars" th:text="${'★'.repeat(r.rating)} + ${'☆'.repeat(5 - r.rating)}"></span>
                    <span class="date" th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd')}"></span>
                </div>
                <p class="review-text" th:text="${r.comment}"></p>

                <div class="review-actions">
                    <form th:action="@{/review/like}" method="post">
                        <input type="hidden" name="reviewId" th:value="${r.id}">
                        <button type="submit" class="btn-like" th:classappend="${r.likedByCurrentUser ? 'liked' : ''}">
                            👍 <span th:text="${r.likeCount}"></span>
                        </button>
                    </form>

                    <form th:action="@{/review/delete}" method="post"
                        th:if="${session.user != null and session.user.id == r.userId}">
                        <input type="hidden" name="id" th:value="${r.id}">
                        <button type="submit" class="btn-delete" style="margin-left:10px;">Delete</button>
                    </form>
                </div>

                <div class="comments-section">
                    <div class="comment-item" th:each="c : ${r.comments}">
                        <strong><span th:text="${c.userName}"></span>:</strong>
                        <span th:text="${c.comment}"></span>

                        <div class="comment-actions">
                            <form th:action="@{/review/like}" method="post" style="display:inline;">
                                <input type="hidden" name="commentId" th:value="${c.id}">
                                <button type="submit" class="btn-like small"
                                    th:classappend="${c.likedByCurrentUser ? 'liked' : ''}">
                                    👍 <span th:text="${c.likeCount}"></span>
                                </button>
                            </form>
                            <form th:action="@{/review/comment/delete}" method="post" style="display:inline;"
                                th:if="${session.user != null and session.user.id == c.userId}">
                                <input type="hidden" name="id" th:value="${c.id}">
                                <button type="submit" class="btn-delete small">Delete</button>
                            </form>
                        </div>
                    </div>

                    <form th:action="@{/review/comment/add}" method="post" class="add-reply-form"
                        th:if="${session.user != null}">
                        <input type="hidden" name="reviewId" th:value="${r.id}">
                        <input type="text" name="comment" placeholder="Reply to this review..." required>
                        <button type="submit">Reply</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" th:if="${toastMessage}" th:text="${toastMessage}"></div>
</body>

</html>
