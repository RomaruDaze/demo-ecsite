<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cart - RogerMart</title>
    <link rel="stylesheet" th:href="@{/css/home.style.css}">
    <link rel="stylesheet" th:href="@{/css/cart.style.css}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand"><a th:href="@{/home}" style="color: inherit; text-decoration: none;">RogerMart.</a></div>
        
        <div class="nav-links">
            <span class="user-greeting" th:if="${session.user != null}">
                <a th:href="@{/profile}" style="text-decoration: none; color: inherit;">
                    Welcome Back, <span th:text="${session.user.name}"></span>!
                </a>
            </span>

            <span class="user-greeting" th:unless="${session.user != null}">
                Welcome, Guest!
                <a th:href="@{/login}" class="btn-nav-login">Login</a>
            </span>

            <a th:href="@{/wishlist}">Wishlist</a>
            <a th:href="@{/cart}" class="cart-link">
                Cart
                <span class="cart-badge" th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}"></span>
            </a>
        </div>
    </nav>

    <main class="main-content">
        <h2>Your Shopping Cart</h2>

        <div class="cart-layout">
            <div class="cart-items">
                <p th:if="${#lists.isEmpty(cartItems)}">Your cart is empty.</p>

                <div class="cart-item-row" th:each="cItem : ${cartItems}">
                    <input type="checkbox" class="cart-item-check" th:checked="${cItem.checked}"
                        th:attr="data-id=${cItem.id}">

                    <img th:src="${cItem.item.imageUrl}" class="cart-image">

                    <div class="cart-item-info">
                        <h4 th:text="${cItem.item.name}"></h4>
                        <p class="cart-price" th:text="'¥' + ${cItem.item.price}"></p>

                        <div class="quantity-controls">
                            <button type="button" class="btn-qty-minus" th:attr="data-id=${cItem.id}">-</button>
                            <input type="text" class="qty-input" th:id="'qty-' + ${cItem.id}"
                                th:attr="data-id=${cItem.id}, data-original=${cItem.quantity}"
                                th:value="${cItem.quantity}" min="0">
                            <button type="button" class="btn-qty-plus" th:attr="data-id=${cItem.id}">+</button>
                        </div>

                        <form th:id="'form-qty-update-' + ${cItem.id}" th:action="@{/cart/updateQuantity}" method="post"
                            style="display:none;">
                            <input type="hidden" name="id" th:value="${cItem.id}">
                            <input type="hidden" name="quantity" th:id="'hidden-qty-' + ${cItem.id}"
                                th:value="${cItem.quantity}">
                        </form>

                        <form th:id="'form-check-update-' + ${cItem.id}" th:action="@{/cart/updateChecked}"
                            method="post" style="display:none;">
                            <input type="hidden" name="id" th:value="${cItem.id}">
                            <input type="hidden" name="checked" th:id="'hidden-check-' + ${cItem.id}"
                                th:value="${cItem.checked}">
                        </form>
                    </div>

                    <form th:action="@{/cart/remove}" method="post">
                        <input type="hidden" name="id" th:value="${cItem.id}">
                        <button type="submit" class="btn-remove">Remove</button>
                    </form>
                </div>
            </div>

            <div class="cart-summary" th:unless="${#lists.isEmpty(cartItems)}">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Total:</span>
                    <span class="total-price" th:text="'¥' + ${totalPrice}"></span>
                </div>

                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

                <h3>Payment Method</h3>

                <div class="payment-switch">
                    <input type="radio" name="paymentMethod" id="method-cc" value="credit-card" checked
                        onchange="togglePaymentMethod()">
                    <label for="method-cc" class="switch-label">💳 Credit Card</label>

                    <input type="radio" name="paymentMethod" id="method-paypay" value="paypay"
                        onchange="togglePaymentMethod()">
                    <label for="method-paypay" class="switch-label">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/Paypay.svg/1280px-Paypay.svg.png?_=20220627054042"
                            alt="">
                    </label>

                    <div class="switch-slider"></div>
                </div>

                <div id="credit-card-form" class="payment-form">
                    <div class="cc-input-group">
                        <label>Card Number</label>
                        <div class="cc-number-wrapper">
                            <input type="text" id="cc-number" placeholder="0000 0000 0000 0000" maxlength="19">
                            <span id="cc-brand" class="cc-brand">💳</span>
                        </div>
                    </div>
                    <div class="cc-details-row">
                        <div class="cc-input-group">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="cc-input-group">
                            <label>CVC</label>
                            <input type="text" placeholder="123" maxlength="4">
                        </div>
                    </div>
                </div>

                <div id="paypay-form" class="payment-form" style="display: none;">
                    <p style="font-size: 0.9em; color: #555; margin: 0;">You will be redirected to the PayPay app or
                        website to complete your purchase securely.</p>
                </div>

                <button class="btn-checkout" style="margin-top: 20px;">Proceed to Checkout</button>
            </div>
        </div>
    </main>
    <div id="toast" class="toast" th:if="${toastMessage}" th:text="${toastMessage}"></div>

    <script>
        function updateCartQuantity(id, newQty, originalQty) {
            if (newQty <= 0) {
                if (confirm("Do you want to remove this item from the cart?")) {
                    document.getElementById('hidden-qty-' + id).value = 0;
                    document.getElementById('form-qty-update-' + id).submit();
                } else {
                    document.getElementById('qty-' + id).value = originalQty > 0 ? originalQty : 1;
                }
            } else if (newQty !== originalQty) {
                document.getElementById('hidden-qty-' + id).value = newQty;
                document.getElementById('form-qty-update-' + id).submit();
            }
        }

        document.querySelectorAll('.qty-input').forEach(input => {
            input.addEventListener('change', function () {
                updateCartQuantity(this.dataset.id, parseInt(this.value), parseInt(this.dataset.original));
            });
        });
        document.querySelectorAll('.btn-qty-minus').forEach(btn => {
            btn.addEventListener('click', function () {
                let id = this.dataset.id;
                let input = document.getElementById('qty-' + id);
                let original = parseInt(input.dataset.original);
                let newQty = parseInt(input.value) - 1;
                input.value = newQty;
                updateCartQuantity(id, newQty, original);
            });
        });
        document.querySelectorAll('.btn-qty-plus').forEach(btn => {
            btn.addEventListener('click', function () {
                let id = this.dataset.id;
                let input = document.getElementById('qty-' + id);
                let original = parseInt(input.dataset.original);
                let newQty = parseInt(input.value) + 1;
                input.value = newQty;
                updateCartQuantity(id, newQty, original);
            });
        });

        // Handle checkbox toggles instantly
        document.querySelectorAll('.cart-item-check').forEach(checkbox => {
            checkbox.addEventListener('change', function () {
                const id = this.dataset.id;
                document.getElementById('hidden-check-' + id).value = this.checked;
                document.getElementById('form-check-update-' + id).submit();
            });
        });

        // Handle Payment Method Toggle
        function togglePaymentMethod() {
            const method = document.querySelector('input[name="paymentMethod"]:checked').value;
            if (method === 'credit-card') {
                document.getElementById('credit-card-form').style.display = 'block';
                document.getElementById('paypay-form').style.display = 'none';
            } else {
                document.getElementById('credit-card-form').style.display = 'none';
                document.getElementById('paypay-form').style.display = 'block';
            }
        }

        // Handle Credit Card Detection and Formatting
        const ccInput = document.getElementById('cc-number');
        const ccBrand = document.getElementById('cc-brand');

        if (ccInput) {
            ccInput.addEventListener('input', function (e) {
                // Remove non-numeric characters and format with spaces every 4 digits
                let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
                let formattedValue = '';
                for (let i = 0; i < value.length; i++) {
                    if (i > 0 && i % 4 === 0) {
                        formattedValue += ' ';
                    }
                    formattedValue += value[i];
                }
                e.target.value = formattedValue;

                // Brand Detection Logic
                let prefix2 = parseInt(value.substring(0, 2));
                let prefix4 = parseInt(value.substring(0, 4));

                // Image URLs for the card logos
                const visaIcon = '<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/Visa_Inc._logo_%282005%E2%80%932014%29.svg/1920px-Visa_Inc._logo_%282005%E2%80%932014%29.svg.png?_=20170118154621" alt="Visa">';
                const masterIcon = '<img src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Mastercard_2019_logo.svg" alt="MasterCard">';
                const jcbIcon = '<img src="https://upload.wikimedia.org/wikipedia/commons/4/40/JCB_logo.svg" alt="JCB">';
                const defaultIcon = '💳';

                if (value.startsWith('4')) {
                    ccBrand.innerHTML = visaIcon;
                } else if ((prefix2 >= 51 && prefix2 <= 55) || (prefix4 >= 2221 && prefix4 <= 2720)) {
                    ccBrand.innerHTML = masterIcon;
                } else if (prefix4 >= 3528 && prefix4 <= 3589) {
                    ccBrand.innerHTML = jcbIcon;
                } else {
                    ccBrand.innerHTML = defaultIcon;
                    ccBrand.style.color = '#999';
                }
            });
        }
    </script>
</body>

</html>
