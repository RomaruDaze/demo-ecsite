<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - RogerMart</title>
    <link rel="stylesheet" th:href="@{/css/home.style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.style.css}">
</head>

<body>
    <nav class="navbar admin-navbar">
        <div class="nav-brand"><a th:href="@{/admin}" style="color: inherit; text-decoration: none;">RogerMart
                Admin.</a></div>
        <div class="nav-links">
            <span class="user-greeting">Admin: <span th:text="${session.user.name}"></span></span>
            <a th:href="@{/home}">Back to Store</a>
            <a th:href="@{/logout}" style="color: #dc3545; font-weight: bold;">Logout</a>
        </div>
    </nav>

    <main class="admin-main">
        <aside class="admin-sidebar">
            <button class="tab-btn active" onclick="openTab(event, 'Overview')">📊 Dashboard Overview</button>
            <button class="tab-btn" onclick="openTab(event, 'Users')">👥 Manage Users</button>
            <button class="tab-btn" onclick="openTab(event, 'Inventory')">📦 Manage Inventory</button>
            <button class="tab-btn" onclick="openTab(event, 'Orders')">🛒 View All Orders</button>
        </aside>

        <section class="admin-content">

            <div id="Overview" class="tab-content active">
                <h2>Dashboard Overview</h2>
                <div class="dashboard-cards">
                    <div class="card">
                        <h3>Total Users</h3>
                        <p th:text="${#lists.size(users)}"></p>
                    </div>
                    <div class="card">
                        <h3>Total Items</h3>
                        <p th:text="${#lists.size(items)}"></p>
                    </div>
                    <div class="card">
                        <h3>Total Orders</h3>
                        <p th:text="${#lists.size(orders)}"></p>
                    </div>
                </div>
            </div>

            <div id="Users" class="tab-content">
                <h2>Manage Users</h2>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}"></td>
                            <td th:text="${u.name}"></td>
                            <td th:text="${u.email}"></td>
                            <td><span class="role-badge" th:text="${u.role}"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="Inventory" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Manage Inventory</h2>
                    <button class="btn-action">➕ Add New Item</button>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${items}">
                            <td th:text="${item.id}"></td>
                            <td><img th:src="${item.imageUrl}" style="width: 40px; border-radius: 4px;"></td>
                            <td th:text="${item.name}"></td>
                            <td th:text="'¥' + ${item.price}"></td>
                            <td>
                                <button class="btn-edit">Edit</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="Orders" class="tab-content">
                <h2>All Orders</h2>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>User ID</th>
                            <th>Date</th>
                            <th>Total</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="'#' + ${order.id}"></td>
                            <td th:text="${order.userId}"></td>
                            <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
                            <td th:text="'¥' + ${order.totalPrice}"></td>
                            <td>
                                <form th:action="@{/admin/order/update-status}" method="post"
                                    style="display: flex; gap: 10px; align-items: center;">
                                    <input type="hidden" name="orderId" th:value="${order.id}">
                                    <select name="status" class="status-select">
                                        <option value="PROCESSING" th:selected="${order.status == 'PROCESSING'}">
                                            PROCESSING</option>
                                        <option value="SHIPPED" th:selected="${order.status == 'SHIPPED'}">SHIPPED
                                        </option>
                                        <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">DELIVERED
                                        </option>
                                        <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED
                                        </option>
                                    </select>
                                    <button type="submit" class="btn-action"
                                        style="background-color: #17a2b8; padding: 6px 12px; font-size: 0.9em;">Update</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </section>
    </main>
    <div id="toast" class="toast" th:if="${toastMessage}" th:text="${toastMessage}"></div>

    <script th:inline="javascript">
        // 1. Existing function to handle clicks
        function openTab(evt, tabName) {
            let tabContents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove("active");
            }
            let tablinks = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            if (evt) {
                evt.currentTarget.classList.add("active");
            } else {
                // If triggered by backend redirect, find the corresponding button
                let targetBtn = Array.from(tablinks).find(btn => btn.innerText.includes(tabName));
                if (targetBtn) targetBtn.classList.add("active");
            }
        }

        // 2. Automatically open the tab sent from the backend
        document.addEventListener("DOMContentLoaded", function () {
            let serverTab = /*[[${activeTab}]]*/ null;
            if (serverTab) {
                openTab(null, serverTab);
            }
        });
    </script>
</body>

</html>
