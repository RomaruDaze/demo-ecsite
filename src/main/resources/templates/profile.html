<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Profile - RogerMart</title>
    <link rel="stylesheet" th:href="@{/css/home.style.css}">
    <link rel="stylesheet" th:href="@{/css/signin.style.css}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand"><a th:href="@{/home}" style="color: inherit; text-decoration: none;">RogerMart.</a></div>
        <div class="nav-links">
            <span class="user-greeting"><a th:href="@{/profile}" style="text-decoration: none; color: inherit;">Welcome
                    Back, <span th:text="${session.user.name}"></span>!</a></span>
            <a th:href="@{/wishlist}">Wishlist</a>
            <a th:href="@{/cart}" class="cart-link">Cart <span class="cart-badge"
                    th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}"></span></a>
        </div>
    </nav>

    <div class="signin-container" style="margin: 40px auto;">
        <h2>My Profile</h2>

        <form th:action="@{/profile/update}" method="post">
            <h3 class="section-title">Personal Info</h3>

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" class="track-change" th:value="${session.user.name}"
                    th:data-original="${session.user.name}">
            </div>

            <div class="form-group">
                <label>Email (Cannot be changed)</label>
                <input type="email" th:value="${session.user.email}" disabled
                    style="background-color: #e9ecef; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label>Password (Cannot be changed)</label>
                <input type="password" value="********" disabled
                    style="background-color: #e9ecef; cursor: not-allowed;">
            </div>

            <h3 class="section-title">Address & Contact</h3>

            <div class="form-group">
                <label>Zip-Code</label>
                <input type="text" name="zipcode" class="track-change" th:value="${session.user.zipcode}"
                    th:data-original="${session.user.zipcode}">
            </div>

            <div class="form-group">
                <label>Prefecture</label>
                <input type="text" name="prefecture" class="track-change" th:value="${session.user.prefecture}"
                    th:data-original="${session.user.prefecture}">
            </div>

            <div class="form-group">
                <label>Municipalities</label>
                <input type="text" name="municipalities" class="track-change" th:value="${session.user.municipalities}"
                    th:data-original="${session.user.municipalities}">
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" class="track-change" th:value="${session.user.address}"
                    th:data-original="${session.user.address}">
            </div>

            <div class="form-group">
                <label>Telephone</label>
                <input type="text" name="telephone" class="track-change" th:value="${session.user.telephone}"
                    th:data-original="${session.user.telephone}">
            </div>

            <button type="submit" id="btn-save" class="btn-submit" style="background-color: #007bff;" disabled>Save
                Changes</button>
        </form>

        <br>
        <hr><br>
        <a th:href="@{/logout}" class="btn-submit"
            style="display:block; text-align:center; background-color:#dc3545; text-decoration:none;">Logout</a>
    </div>

    <div id="toast" class="toast" th:if="${toastMessage}" th:text="${toastMessage}"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const saveBtn = document.getElementById("btn-save");
            const inputs = document.querySelectorAll(".track-change");

            inputs.forEach(input => {
                input.addEventListener("input", () => {
                    let hasChanges = Array.from(inputs).some(inp => inp.value !== inp.getAttribute("data-original"));
                    saveBtn.disabled = !hasChanges;
                });
            });
        });
    </script>
</body>

</html>
